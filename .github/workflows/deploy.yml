name: Deploy Vite React app to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        working-directory: toolmaster-hardware
        run: npm ci

      - name: Build
        working-directory: toolmaster-hardware
        run: npm run build

      - name: Create 404.html fallback (SPA)
        working-directory: toolmaster-hardware
        shell: bash
        run: |
          rm -f dist/404.html
          cat > dist/404.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Redirecting...</title>
              <meta http-equiv="refresh" content="0; URL='./index.html'" />
            </head>
            <body>
              <script>
                window.location.replace('./index.html');
              </script>
            </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: toolmaster-hardware/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

